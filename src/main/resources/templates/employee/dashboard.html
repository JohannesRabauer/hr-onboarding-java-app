<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Onboarding - Employee Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>HR Onboarding System - Employee</h1>
            <ul>
                <li><a href="/employee/dashboard">Dashboard</a></li>
                <li><a href="/auth/logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2>My Onboarding</h2>
        <table class="progress-table">
            <thead>
                <tr>
                    <th>Template</th>
                    <th>Start Date</th>
                    <th>Expected End Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="progress : ${progressList}">
                    <td th:text="${progress.template.name}"></td>
                    <td th:text="${progress.startDate}"></td>
                    <td th:text="${progress.expectedEndDate}"></td>
                    <td th:text="${progress.actualEndDate != null ? 'Completed' : 'In Progress'}"></td>
                    <td>
                        <a th:href="@{/employee/progress/{id}(id=${progress.id})}" class="btn btn-small">View</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
